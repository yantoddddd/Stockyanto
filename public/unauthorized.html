<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Akses Ditolak | Yanto Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border-radius: 32px; padding: 40px 32px; max-width: 500px; width: 100%; border: 1px solid rgba(255,255,255,0.08); text-align: center; box-shadow: 0 25px 45px rgba(0,0,0,0.3); }
        .icon { font-size: 4rem; color: #ef4444; margin-bottom: 16px; }
        h1 { color: #ef4444; font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 24px; line-height: 1.6; }
        .info-box { background: rgba(255,255,255,0.04); border-radius: 16px; padding: 16px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.06); }
        .info-box .label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .info-box .value { font-size: 1rem; color: #e2e8f0; font-weight: 500; font-family: monospace; }
        .btn-back { background: #334155; border: none; padding: 12px 28px; border-radius: 40px; color: white; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; text-decoration: none; font-size: 0.9rem; }
        .btn-back:hover { background: #475569; transform: translateY(-2px); }
        .footer-text { font-size: 0.65rem; color: #475569; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i class="fas fa-lock"></i></div>
        <h1>Akses Ditolak</h1>
        <p class="subtitle">Maaf, Anda bukan Admin.<br>Halaman ini hanya bisa diakses oleh administrator terdaftar.</p>
        <div class="info-box">
            <div class="label">IP Anda</div>
            <div class="value" id="userIP">Mendeteksi...</div>
        </div>
        <a href="/" class="btn-back"><i class="fas fa-home"></i> Kembali ke Beranda</a>
        <div class="footer-text">Yanto Store &copy; 2026</div>
    </div>

    <script>
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                document.getElementById('userIP').textContent = data.ip;
            } catch(e) {
                document.getElementById('userIP').textContent = 'Tidak terdeteksi';
            }
        }
        getIP();
    </script>
</body>
</html>

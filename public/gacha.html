<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Yanto Store | Gacha Machine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #06080d;
            --surface: rgba(255,255,255,0.03);
            --surface2: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.06);
            --accent: #3b82f6;
            --accent2: #60a5fa;
            --text: #e8eaed;
            --text2: #8b8fa3;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --radius: 20px;
            --radius-sm: 12px;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
        body { 
            background: var(--bg);
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding: 20px; color: var(--text);
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(245,158,11,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(239,68,68,0.08) 0%, transparent 50%);
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeScale { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slotBlur { 0%,100% { filter: blur(0); } 50% { filter: blur(3px); } }
        @keyframes jackpotGlow { 0%,100% { box-shadow: 0 0 20px rgba(245,158,11,0.5); } 50% { box-shadow: 0 0 60px rgba(245,158,11,1), 0 0 100px rgba(239,68,68,0.8); } }
        @keyframes coinDrop { 0% { transform: translateY(-100vh) rotate(0deg); opacity:1; } 100% { transform: translateY(100vh) rotate(720deg); opacity:0; } }

        .container { text-align:center; max-width:500px; width:100%; animation:fadeIn 0.5s ease; }

        .header { 
            display:flex; justify-content:space-between; align-items:center; 
            margin-bottom:28px; padding:10px 22px;
            background:var(--surface2); backdrop-filter:blur(20px);
            border-radius:60px; border:1px solid var(--border);
        }
        .header a { color: var(--text2); text-decoration:none; font-size:0.9rem; display:flex; align-items:center; gap:8px; transition:0.2s; }
        .header a:hover { color:white; }
        .header h1 { font-size:1.2rem; font-weight:700; color:var(--warning); }

        .slot-machine {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 32px; padding: 32px 24px;
            border: 2px solid rgba(245,158,11,0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
        }
        .slot-machine::before {
            content:''; position:absolute; top:0; left:0; right:0; height:4px;
            background:linear-gradient(90deg, #f59e0b, #ef4444, #f59e0b);
        }
        .slot-title { font-size:1.4rem; font-weight:800; color:var(--warning); margin-bottom:4px; }
        .slot-subtitle { font-size:0.7rem; color:var(--text2); margin-bottom:20px; letter-spacing:1px; }

        .slot-window {
            background: #000; border-radius: 20px; padding: 20px;
            border: 3px solid rgba(245,158,11,0.4);
            margin-bottom: 20px; position: relative; overflow: hidden;
            min-height: 100px; display:flex; align-items:center; justify-content:center;
        }
        .slot-reel {
            font-size: 2.5rem; font-weight:800; color: var(--warning);
            transition: all 0.1s ease; text-align:center;
        }
        .slot-reel.spinning { animation: slotBlur 0.1s infinite; color: #fbbf24; }

        .slot-info { margin-bottom: 20px; }
        .slot-info .detail-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.82rem; }
        .slot-info .dl { color:var(--text2); }
        .slot-info .dv { color:var(--text); text-align:right; font-weight:600; }

        .btn-spin {
            background:linear-gradient(135deg, #f59e0b, #ef4444);
            width:100%; padding:18px; border:none; border-radius:20px;
            font-weight:700; color:white; cursor:pointer;
            font-size:1.1rem; letter-spacing:1px;
            display:flex; align-items:center; justify-content:center; gap:10px;
            transition:0.3s; text-transform:uppercase;
        }
        .btn-spin:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(245,158,11,0.4); }
        .btn-spin:active { transform:scale(0.96); }
        .btn-spin:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; background:#334155; }

        .result-card {
            background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.3);
            border-radius:16px; padding:20px; margin-top:20px; display:none;
            animation:fadeScale 0.4s ease;
        }
        .result-card.jackpot { background:rgba(245,158,11,0.15); border-color:rgba(245,158,11,0.5); animation:jackpotGlow 1s infinite; }
        .result-name { font-size:1.2rem; font-weight:700; color:var(--success); margin-bottom:8px; }
        .result-name.jackpot { color:var(--warning); font-size:1.5rem; }
        .result-price { font-size:1.5rem; font-weight:800; color:var(--accent2); }
        .btn-claim { 
            background:var(--success); border:none; width:100%; padding:14px; border-radius:14px;
            font-weight:600; color:white; cursor:pointer; margin-top:12px;
            display:flex; align-items:center; justify-content:center; gap:8px;
            transition:0.3s; font-size:0.9rem;
        }
        .btn-claim:hover { box-shadow:0 6px 20px rgba(16,185,129,0.4); }

        .gacha-price-tag {
            background:rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.3);
            border-radius:16px; padding:12px 20px; margin-bottom:20px; display:inline-block;
        }
        .gacha-price-tag .price { font-size:1.5rem; font-weight:800; color:var(--warning); }
        .gacha-price-tag .label { font-size:0.65rem; color:var(--text2); }

        .toast { 
            position:fixed; bottom:30px; left:50%; transform:translateX(-50%); 
            background:#1e293b; padding:12px 24px; border-radius:30px; font-size:0.8rem;
            opacity:0; transition:0.3s; z-index:1200; color:white; 
            display:flex; align-items:center; gap:8px; box-shadow:0 8px 30px rgba(0,0,0,0.4);
        }
        .loading-spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }

        @media (max-width:480px) {
            .slot-reel { font-size:1.8rem; }
            .slot-machine { padding:24px 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="/"><i class="fas fa-arrow-left"></i> Kembali</a>
        <h1><i class="fas fa-dice"></i> Gacha</h1>
        <div style="width:60px;"></div>
    </div>

    <div class="slot-machine">
        <div class="slot-title">🎰 GACHA MACHINE</div>
        <div class="slot-subtitle">SPIN & DAPETKAN PRODUK RANDOM!</div>

        <div class="gacha-price-tag">
            <span class="label">HARGA SPIN</span><br>
            <span class="price" id="gachaPriceDisplay">-</span>
        </div>

        <div class="slot-window">
            <div class="slot-reel" id="slotReel">?</div>
        </div>

        <div class="slot-info">
            <div class="detail-row"><span class="dl">Produk Tersedia</span><span class="dv" id="totalProducts">-</span></div>
            <div class="detail-row"><span class="dl">Jackpot Chance</span><span class="dv" style="color:#f59e0b;">5%</span></div>
            <div class="detail-row"><span class="dl">Status</span><span class="dv" id="spinStatus">Siap spin</span></div>
        </div>

        <button class="btn-spin" id="btnSpin" onclick="startSpin()">
            <i class="fas fa-dice"></i> SPIN SEKARANG!
        </button>

        <div class="result-card" id="resultCard">
            <div class="result-name" id="resultName"></div>
            <div class="result-price" id="resultPrice"></div>
            <button class="btn-claim" onclick="claimGacha()">
                <i class="fas fa-qrcode"></i> BAYAR & KLAIM!
            </button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const QRISPY_TOKEN = 'cki_IBpAYezwDHbfrMuENZMFvFw5mI94M11dAT146N0Ar4HrOWKi';
    const QRISPY_API_URL = 'https://api.qrispy.id';
    
    let gachaPrice = 0;
    let gachaResult = null;
    let orderCode = null;
    let isSpinning = false;
    let currentUser = null;

    function toast(msg, isError) {
        var t = document.getElementById('toast');
        t.innerHTML = '<i class="fas ' + (isError ? 'fa-exclamation-triangle' : 'fa-check-circle') + '"></i> ' + msg;
        t.style.background = isError ? '#b91c1c' : '#1e293b';
        t.style.opacity = '1';
        setTimeout(function(){ t.style.opacity = '0'; }, 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; });
    }

    async function checkLogin() {
        try {
            var res = await fetch('/api/user/profile', { credentials: 'include' });
            var data = await res.json();
            if (data.success) {
                currentUser = data.user;
                return true;
            }
        } catch(e) {}
        return false;
    }

    async function loadGachaInfo() {
        try {
            var res = await fetch('/api/gacha/info');
            var data = await res.json();
            if (data.success && data.gachaPrice > 0) {
                gachaPrice = data.gachaPrice;
                document.getElementById('gachaPriceDisplay').textContent = 'Rp ' + gachaPrice.toLocaleString();
                document.getElementById('totalProducts').textContent = data.totalProducts + ' produk';
            } else {
                document.getElementById('gachaPriceDisplay').textContent = 'Gacha belum siap';
                document.getElementById('btnSpin').disabled = true;
            }
        } catch(e) {
            document.getElementById('gachaPriceDisplay').textContent = 'Error';
            document.getElementById('btnSpin').disabled = true;
        }
    }

    async function startSpin() {
        // Cek login dulu
        if (!currentUser) {
            var loggedIn = await checkLogin();
            if (!loggedIn) {
                toast('⚠️ Login dulu buat spin gacha!', true);
                window.location.href = '/';
                return;
            }
        }

        if (isSpinning) return;
        if (!gachaPrice || gachaPrice <= 0) { toast('Gacha belum siap', true); return; }

        isSpinning = true;
        document.getElementById('btnSpin').disabled = true;
        document.getElementById('btnSpin').innerHTML = '<span class="loading-spinner"></span> SPINNING...';
        document.getElementById('spinStatus').textContent = 'Spinning...';
        document.getElementById('resultCard').style.display = 'none';
        document.getElementById('resultCard').classList.remove('jackpot');
        document.getElementById('resultName').classList.remove('jackpot');

        var reel = document.getElementById('slotReel');
        reel.classList.add('spinning');

        // Simulasi animasi slot (2 detik)
        var emojis = ['🎮', '📱', '💎', '🎁', '🔥', '⚡', '🌟', '🎯', '💻', '🪙'];
        var spinInterval = setInterval(function() {
            reel.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        }, 100);

        // Fetch hasil gacha dari backend
        try {
            var qrisData = await generateQRIS(gachaPrice);
            var res = await fetch('/api/gacha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    customerName: currentUser ? currentUser.name : 'Guest',
                    qrisId: qrisData.qris_id,
                    qrisImage: qrisData.qris_image_url,
                    totalAmount: gachaPrice,
                    expiredAt: qrisData.expired_at
                })
            });
            var data = await res.json();
            
            // Stop animasi setelah 2 detik
            setTimeout(function() {
                clearInterval(spinInterval);
                reel.classList.remove('spinning');
                
                if (data.success) {
                    gachaResult = data;
                    orderCode = data.orderCode;
                    
                    // Tampilkan hasil
                    var resultCard = document.getElementById('resultCard');
                    var resultName = document.getElementById('resultName');
                    resultCard.style.display = 'block';
                    resultName.textContent = '🎉 ' + data.gachaResult;
                    document.getElementById('resultPrice').textContent = 'Rp ' + (data.originalPrice || 0).toLocaleString();
                    
                    if (data.isJackpot) {
                        resultCard.classList.add('jackpot');
                        resultName.classList.add('jackpot');
                        resultName.textContent = '🔥 JACKPOT! 🔥 ' + data.gachaResult;
                        reel.textContent = '💎';
                    } else {
                        reel.textContent = '🎁';
                    }
                    
                    document.getElementById('spinStatus').textContent = 'Hasil: ' + data.gachaResult;
                    document.getElementById('btnSpin').innerHTML = '<i class="fas fa-redo"></i> SPIN LAGI';
                } else {
                    reel.textContent = '❌';
                    document.getElementById('spinStatus').textContent = 'Gagal';
                    toast(data.error || 'Gagal spin', true);
                    document.getElementById('btnSpin').innerHTML = '<i class="fas fa-dice"></i> SPIN SEKARANG!';
                }
                
                isSpinning = false;
                document.getElementById('btnSpin').disabled = false;
            }, 2000);

        } catch(e) {
            clearInterval(spinInterval);
            reel.classList.remove('spinning');
            reel.textContent = '❌';
            document.getElementById('spinStatus').textContent = 'Error';
            toast('Gagal terhubung', true);
            isSpinning = false;
            document.getElementById('btnSpin').disabled = false;
            document.getElementById('btnSpin').innerHTML = '<i class="fas fa-dice"></i> SPIN SEKARANG!';
        }
    }

    function claimGacha() {
        if (!orderCode) { toast('Spin dulu!', true); return; }
        window.location.href = '/order/' + orderCode;
    }

    async function generateQRIS(amount) {
        var response = await fetch(QRISPY_API_URL + '/api/payment/qris/generate', {
            method: 'POST',
            headers: { 'X-API-Token': QRISPY_TOKEN, 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: amount })
        });
        var data = await response.json();
        if (data.status !== 'success') throw new Error(data.message || 'Gagal generate QRIS');
        return data.data;
    }

    // Init
    checkLogin();
    loadGachaInfo();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Yanto Store | Gacha Machine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #06080d;
            --surface: rgba(255,255,255,0.03);
            --surface2: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.06);
            --accent: #3b82f6;
            --accent2: #60a5fa;
            --text: #e8eaed;
            --text2: #8b8fa3;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --radius: 20px;
            --radius-sm: 12px;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { 
            background: var(--bg);
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding: 20px; color: var(--text);
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(245,158,11,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(239,68,68,0.1) 0%, transparent 50%);
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeScale { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes jackpotGlow { 0%,100% { box-shadow: 0 0 20px rgba(245,158,11,0.5); } 50% { box-shadow: 0 0 60px rgba(245,158,11,1), 0 0 100px rgba(239,68,68,0.8); } }
        @keyframes coinDrop { 
            0% { transform: translateY(-100vh) rotate(0deg); opacity:1; } 
            100% { transform: translateY(100vh) rotate(720deg); opacity:0; } 
        }
        @keyframes reelSpin {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(0); }
        }

        .container { text-align:center; max-width:500px; width:100%; animation:fadeIn 0.5s ease; }

        .header { 
            display:flex; justify-content:space-between; align-items:center; 
            margin-bottom:28px; padding:10px 22px;
            background:var(--surface2); backdrop-filter:blur(20px);
            border-radius:60px; border:1px solid var(--border);
        }
        .header a { color: var(--text2); text-decoration:none; font-size:0.9rem; display:flex; align-items:center; gap:8px; transition:0.2s; }
        .header a:hover { color:white; }
        .header h1 { font-size:1.2rem; font-weight:700; color:var(--warning); }

        /* SLOT MACHINE */
        .slot-machine {
            background: linear-gradient(180deg, #1a1a2e 0%, #0d1b2a 50%, #16213e 100%);
            border-radius: 32px; padding: 28px 20px;
            border: 2px solid rgba(245,158,11,0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 2px 0 rgba(255,255,255,0.05);
            position: relative; overflow: hidden;
        }
        .slot-machine::before {
            content:''; position:absolute; top:0; left:0; right:0; height:4px;
            background:linear-gradient(90deg, #f59e0b, #ef4444, #f59e0b, #ef4444, #f59e0b);
            animation: pulse 1s infinite;
        }
        .slot-machine::after {
            content:''; position:absolute; bottom:0; left:0; right:0; height:4px;
            background:linear-gradient(90deg, #f59e0b, #ef4444, #f59e0b);
        }
        .slot-title { 
            font-size:1.6rem; font-weight:800; 
            background:linear-gradient(135deg, #f59e0b, #fbbf24, #f59e0b); 
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            margin-bottom:4px; letter-spacing:2px; text-transform:uppercase;
        }
        .slot-subtitle { font-size:0.7rem; color:var(--text2); margin-bottom:20px; letter-spacing:1px; }

        /* REELS */
        .reels-container {
            display:flex; gap:8px; justify-content:center; margin-bottom:20px;
            background: #000; border-radius: 20px; padding: 16px 12px;
            border: 3px solid rgba(245,158,11,0.4);
            position: relative; overflow: hidden;
        }
        .reel-wrapper {
            flex:1; max-width: 100px; height: 120px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a15 100%);
            border-radius: 12px; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .reel-strip {
            transition: transform 0.1s ease;
        }
        .reel-strip.spinning {
            animation: reelSpin 0.15s linear infinite;
        }
        .reel-item {
            height: 120px; display:flex; align-items:center; justify-content:center;
            font-size: 3rem; color: white;
        }
        
        /* Glow line di tengah reel */
        .reel-wrapper::after {
            content:''; position:absolute; top:50%; left:0; right:0; height:2px;
            background:rgba(245,158,11,0.5); transform:translateY(-50%);
            box-shadow:0 0 10px rgba(245,158,11,0.3);
            pointer-events:none; z-index:1;
        }

        /* SPIN BUTTON */
        .btn-spin {
            background:linear-gradient(135deg, #f59e0b, #dc2626);
            width:100%; padding:16px; border:none; border-radius:20px;
            font-weight:700; color:white; cursor:pointer;
            font-size:1.1rem; letter-spacing:1px;
            display:flex; align-items:center; justify-content:center; gap:10px;
            transition:0.3s; text-transform:uppercase;
            box-shadow: 0 8px 30px rgba(245,158,11,0.3);
        }
        .btn-spin:hover { transform:translateY(-2px); box-shadow:0 12px 40px rgba(245,158,11,0.5); }
        .btn-spin:active { transform:scale(0.96); }
        .btn-spin:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; background:#334155; }

        /* RESULT */
        .result-card {
            background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.3);
            border-radius:16px; padding:20px; margin-top:16px; display:none;
            animation:fadeScale 0.4s ease;
        }
        .result-card.jackpot { 
            background:rgba(245,158,11,0.15); border-color:rgba(245,158,11,0.5); 
            animation:jackpotGlow 1s infinite; 
        }
        .result-name { font-size:1.2rem; font-weight:700; color:var(--success); margin-bottom:8px; }
        .result-name.jackpot { color:var(--warning); font-size:1.5rem; }
        .result-price { font-size:1.3rem; font-weight:800; color:var(--accent2); margin-bottom:4px; }

        .gacha-price-tag {
            background:rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.3);
            border-radius:16px; padding:10px 20px; margin-bottom:16px; display:inline-block;
        }
        .gacha-price-tag .price { font-size:1.5rem; font-weight:800; color:var(--warning); }
        .gacha-price-tag .label { font-size:0.65rem; color:var(--text2); }

        .slot-info { display:flex; justify-content:space-around; margin:12px 0; font-size:0.7rem; color:var(--text2); }
        .slot-info span { color:var(--warning); font-weight:600; }

        .toast { 
            position:fixed; bottom:30px; left:50%; transform:translateX(-50%); 
            background:#1e293b; padding:12px 24px; border-radius:30px; font-size:0.8rem;
            opacity:0; transition:0.3s; z-index:1200; color:white; 
            display:flex; align-items:center; gap:8px; box-shadow:0 8px 30px rgba(0,0,0,0.4);
        }
        .loading-spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }

        /* Confetti */
        #confettiContainer { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999; overflow:hidden; }
        .confetti-piece { position:absolute; width:10px; height:20px; top:-30px; animation:coinDrop 3s linear forwards; }

        @media (max-width:480px) {
            .reel-wrapper { height: 100px; }
            .reel-item { height: 100px; font-size: 2.2rem; }
            .slot-machine { padding:20px 14px; }
        }
    </style>
</head>
<body>

<div id="confettiContainer"></div>

<div class="container">
    <div class="header">
        <a href="/"><i class="fas fa-arrow-left"></i> Kembali</a>
        <h1><i class="fas fa-dice"></i> GACHA</h1>
        <div style="width:60px;"></div>
    </div>

    <div class="slot-machine">
        <div class="slot-title">&#127920; SLOT MACHINE</div>
        <div class="slot-subtitle">SPIN & DAPATKAN PRODUK RANDOM!</div>

        <div class="gacha-price-tag">
            <span class="label">HARGA PER SPIN</span><br>
            <span class="price" id="gachaPriceDisplay">-</span>
        </div>

        <!-- REELS -->
        <div class="reels-container">
            <div class="reel-wrapper">
                <div class="reel-strip" id="reel1">
                    <div class="reel-item">&#127920;</div>
                </div>
            </div>
            <div class="reel-wrapper">
                <div class="reel-strip" id="reel2">
                    <div class="reel-item">&#127920;</div>
                </div>
            </div>
            <div class="reel-wrapper">
                <div class="reel-strip" id="reel3">
                    <div class="reel-item">&#127920;</div>
                </div>
            </div>
        </div>

        <div class="slot-info">
            <span>Produk: <b id="totalProducts">-</b></span>
            <span>Jackpot: <b style="color:#f59e0b;">5%</b></span>
            <span id="spinStatus">Siap!</span>
        </div>

        <button class="btn-spin" id="btnSpin" onclick="startSpin()">
            <i class="fas fa-dice"></i> SPIN SEKARANG!
        </button>

        <div class="result-card" id="resultCard">
            <div class="result-name" id="resultName"></div>
            <div class="result-price" id="resultPrice"></div>
            <button class="btn-spin" onclick="claimGacha()" style="margin-top:12px;background:var(--success);">
                <i class="fas fa-qrcode"></i> BAYAR & KLAIM!
            </button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const QRISPY_TOKEN = 'cki_IBpAYezwDHbfrMuENZMFvFw5mI94M11dAT146N0Ar4HrOWKi';
    const QRISPY_API_URL = 'https://api.qrispy.id';
    
    let gachaPrice = 0;
    let gachaResultData = null;
    let orderCode = null;
    let isSpinning = false;
    let currentUser = null;

    // Simbol slot (pake kode HTML entity biar bukan emoji native)
    const symbols = [
        '&#127920;', // 🎰
        '&#128142;', // 💎
        '&#127873;', // 🎁
        '&#128293;', // 🔥
        '&#9889;',   // ⚡
        '&#127775;', // 🌟
        '&#128176;', // 💰
        '&#127894;', // 🎖
        '&#128165;', // 💥
        '&#128081;', // 👑
    ];

    function toast(msg, isError) {
        var t = document.getElementById('toast');
        t.innerHTML = '<i class="fas ' + (isError ? 'fa-exclamation-triangle' : 'fa-check-circle') + '"></i> ' + msg;
        t.style.background = isError ? '#b91c1c' : '#1e293b';
        t.style.opacity = '1';
        setTimeout(function(){ t.style.opacity = '0'; }, 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; });
    }

    function launchConfetti() {
        var container = document.getElementById('confettiContainer');
        var colors = ['#f59e0b', '#ef4444', '#10b981', '#3b82f6', '#a78bfa', '#fbbf24'];
        for (var i = 0; i < 60; i++) {
            var piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.style.left = Math.random() * 100 + '%';
            piece.style.background = colors[Math.floor(Math.random() * colors.length)];
            piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
            piece.style.animationDelay = Math.random() * 0.5 + 's';
            piece.style.width = (Math.random() * 8 + 6) + 'px';
            piece.style.height = (Math.random() * 14 + 10) + 'px';
            piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            container.appendChild(piece);
            setTimeout(function(p) { p.remove(); }, 3500, piece);
        }
    }

    async function checkLogin() {
        try {
            var res = await fetch('/api/user/profile', { credentials: 'include' });
            var data = await res.json();
            if (data.success) {
                currentUser = data.user;
                return true;
            }
        } catch(e) {}
        return false;
    }

    async function loadGachaInfo() {
        try {
            var res = await fetch('/api/gacha/info');
            var data = await res.json();
            if (data.success && data.gachaPrice > 0) {
                gachaPrice = data.gachaPrice;
                document.getElementById('gachaPriceDisplay').textContent = 'Rp ' + gachaPrice.toLocaleString();
                document.getElementById('totalProducts').textContent = data.totalProducts;
            } else {
                document.getElementById('gachaPriceDisplay').textContent = 'Belum siap';
                document.getElementById('btnSpin').disabled = true;
            }
        } catch(e) {
            document.getElementById('gachaPriceDisplay').textContent = 'Error';
        }
    }

    async function startSpin() {
        if (!currentUser) {
            var loggedIn = await checkLogin();
            if (!loggedIn) {
                toast('&#9888;&#65039; Login dulu buat spin gacha!', true);
                setTimeout(function() { window.location.href = '/profile'; }, 1000);
                return;
            }
        }

        if (isSpinning) return;
        if (!gachaPrice || gachaPrice <= 0) { toast('Gacha belum siap', true); return; }

        isSpinning = true;
        document.getElementById('btnSpin').disabled = true;
        document.getElementById('btnSpin').innerHTML = '<span class="loading-spinner"></span> SPINNING...';
        document.getElementById('spinStatus').innerHTML = 'Spinning...';
        document.getElementById('resultCard').style.display = 'none';
        document.getElementById('resultCard').classList.remove('jackpot');

        // Animasikan semua reel
        var reels = ['reel1', 'reel2', 'reel3'];
        var intervals = [];
        
        reels.forEach(function(reelId) {
            var strip = document.getElementById(reelId);
            strip.classList.add('spinning');
            
            var interval = setInterval(function() {
                var randomSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                strip.innerHTML = '<div class="reel-item">' + randomSymbol + '</div>';
            }, 80);
            intervals.push(interval);
        });

        // Fetch hasil gacha
        try {
            var qrisData = await generateQRIS(gachaPrice);
            var res = await fetch('/api/gacha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    customerName: currentUser ? currentUser.name : 'Guest',
                    qrisId: qrisData.qris_id,
                    qrisImage: qrisData.qris_image_url,
                    totalAmount: gachaPrice,
                    expiredAt: qrisData.expired_at
                })
            });
            var data = await res.json();
            
            // Stop animasi setelah delay random (2-3 detik)
            var spinDuration = 2000 + Math.random() * 1000;
            
            setTimeout(function() {
                intervals.forEach(function(interval, i) {
                    clearInterval(interval);
                    var strip = document.getElementById(reels[i]);
                    strip.classList.remove('spinning');
                    
                    // Set hasil
                    if (data.success) {
                        var resultSymbol = data.isJackpot ? '&#128081;' : symbols[i * 2];
                        strip.innerHTML = '<div class="reel-item">' + resultSymbol + '</div>';
                    } else {
                        strip.innerHTML = '<div class="reel-item" style="color:#ef4444;">&#10060;</div>';
                    }
                });

                if (data.success) {
                    gachaResultData = data;
                    orderCode = data.orderCode;
                    
                    var resultCard = document.getElementById('resultCard');
                    var resultName = document.getElementById('resultName');
                    resultCard.style.display = 'block';
                    
                    if (data.isJackpot) {
                        resultCard.classList.add('jackpot');
                        resultName.classList.add('jackpot');
                        resultName.innerHTML = '&#128293; JACKPOT! &#128293;<br>' + escapeHtml(data.gachaResult);
                        launchConfetti();
                    } else {
                        resultName.innerHTML = '&#127873; ' + escapeHtml(data.gachaResult);
                    }
                    
                    document.getElementById('resultPrice').textContent = 'Harga asli: Rp ' + (data.originalPrice || 0).toLocaleString();
                    document.getElementById('spinStatus').innerHTML = '<span style="color:#10b981;">&#10004; Siap klaim!</span>';
                    document.getElementById('btnSpin').innerHTML = '<i class="fas fa-redo"></i> SPIN LAGI';
                    document.getElementById('btnSpin').style.background = 'linear-gradient(135deg, #f59e0b, #dc2626)';
                } else {
                    document.getElementById('spinStatus').innerHTML = '<span style="color:#ef4444;">Gagal</span>';
                    toast(data.error || 'Gagal spin', true);
                    document.getElementById('btnSpin').innerHTML = '<i class="fas fa-dice"></i> SPIN SEKARANG!';
                    document.getElementById('btnSpin').style.background = 'linear-gradient(135deg, #f59e0b, #dc2626)';
                }
                
                isSpinning = false;
                document.getElementById('btnSpin').disabled = false;
            }, spinDuration);

        } catch(e) {
            intervals.forEach(function(interval) { clearInterval(interval); });
            reels.forEach(function(reelId) {
                var strip = document.getElementById(reelId);
                strip.classList.remove('spinning');
                strip.innerHTML = '<div class="reel-item" style="color:#ef4444;">&#10060;</div>';
            });
            document.getElementById('spinStatus').innerHTML = '<span style="color:#ef4444;">Error</span>';
            toast('Gagal terhubung', true);
            isSpinning = false;
            document.getElementById('btnSpin').disabled = false;
            document.getElementById('btnSpin').innerHTML = '<i class="fas fa-dice"></i> SPIN SEKARANG!';
            document.getElementById('btnSpin').style.background = 'linear-gradient(135deg, #f59e0b, #dc2626)';
        }
    }

    function claimGacha() {
        if (!orderCode) { toast('Spin dulu!', true); return; }
        window.location.href = '/order/' + orderCode;
    }

    async function generateQRIS(amount) {
        var response = await fetch(QRISPY_API_URL + '/api/payment/qris/generate', {
            method: 'POST',
            headers: { 'X-API-Token': QRISPY_TOKEN, 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: amount })
        });
        var data = await response.json();
        if (data.status !== 'success') throw new Error(data.message || 'Gagal generate QRIS');
        return data.data;
    }

    // Init
    checkLogin();
    loadGachaInfo();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Yanto Store | Detail Pesanan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px;
            max-width: 520px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo h2 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #94a3f8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .success-icon {
            text-align: center;
            margin-bottom: 20px;
        }
        .success-icon i {
            font-size: 4rem;
            color: #10b981;
            animation: pulse 0.5s ease;
        }
        h1 {
            text-align: center;
            color: #10b981;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .product-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #60a5fa;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #3b82f6;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .link-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        .text-content {
            color: #e2e8f0;
            font-size: 0.85rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .bonus-list {
            list-style: none;
        }
        .bonus-list li {
            color: #e2e8f0;
            font-size: 0.85rem;
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .bonus-list li i {
            color: #f59e0b;
            font-size: 0.7rem;
        }
        .footer-note {
            text-align: center;
            color: #475569;
            font-size: 0.65rem;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .qr-container {
            text-align: center;
        }
        .qr-container h2 {
            color: white;
            font-size: 1.2rem;
            margin-top: 12px;
        }
        .qris-img {
            width: 100%;
            max-width: 220px;
            margin: 20px auto;
            display: block;
            background: white;
            padding: 16px;
            border-radius: 24px;
            animation: fadeIn 0.5s ease;
        }
        .total-amount {
            font-size: 1.8rem;
            font-weight: 700;
            color: #60a5fa;
            text-align: center;
            margin: 16px 0;
        }
        .status-text {
            text-align: center;
            color: #f59e0b;
            margin: 12px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .refresh-btn, .cancel-btn, .copy-btn {
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .refresh-btn {
            background: #3b82f6;
            color: white;
        }
        .refresh-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        .cancel-btn {
            background: #ef4444;
            color: white;
        }
        .cancel-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        .copy-btn {
            background: #334155;
            color: white;
            margin-top: 8px;
        }
        .copy-btn:hover {
            background: #475569;
            transform: translateY(-2px);
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .button-group .copy-btn {
            flex: 1;
            margin-top: 0;
        }
        .expiry-text {
            text-align: center;
            color: #64748b;
            font-size: 0.7rem;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>
    <div id="pendingContent" style="display:block;">
        <div class="card">
            <div class="logo">
                <h2><i class="fas fa-store"></i> Yanto Store</h2>
            </div>
            <div class="qr-container">
                <i class="fas fa-qrcode" style="font-size: 2.5rem; color: #60a5fa;"></i>
                <h2>Scan QRIS untuk Membayar</h2>
                <img id="qrisImage" class="qris-img" alt="QRIS">
                <div class="total-amount">Rp <span id="totalAmount"></span></div>
                <div class="status-text" id="statusText">
                    <i class="fas fa-hourglass-half"></i> Menunggu pembayaran...
                </div>
                <button class="refresh-btn" onclick="checkStatus()">
                    <i class="fas fa-sync-alt"></i> Cek Status
                </button>
                <button class="cancel-btn" id="cancelBtn" onclick="cancelOrder()">
                    <i class="fas fa-times-circle"></i> Batalkan Pesanan
                </button>
                <div class="expiry-text">
                    <i class="far fa-clock"></i> Kadaluarsa: <span id="expiryTime"></span>
                </div>
            </div>
        </div>
    </div>
    <div id="successContent" style="display:none;">
        <div class="card">
            <div class="logo">
                <h2><i class="fas fa-store"></i> Yanto Store</h2>
            </div>
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Pembayaran Berhasil!</h1>
            <div class="product-name" id="productName"></div>
            
            <div class="section">
                <div class="section-title"><i class="fas fa-box"></i> Barang Utama</div>
                <div class="section-content" id="productCodeContainer"></div>
                <button class="copy-btn" id="copyTextBtn" style="margin-top:12px;"><i class="fas fa-copy"></i> 📋 Salin Teks</button>
            </div>
            
            <div id="bonusContainer" style="display:none;">
                <div class="section">
                    <div class="section-title"><i class="fas fa-gift"></i> Bonus</div>
                    <div class="section-content" id="bonusContent"></div>
                    <button class="copy-btn" id="copyBonusBtn" style="margin-top:12px;"><i class="fas fa-copy"></i> 📋 Salin Bonus</button>
                </div>
            </div>
            
            <div class="footer-note">
                <i class="fas fa-save"></i> Simpan informasi di atas
            </div>
        </div>
    </div>

    <script>
        const orderCode = window.location.pathname.split('/').pop();
        let pollingInterval = null;
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        function formatBonus(content) {
            if (content.includes('\n')) {
                const items = content.split('\n').filter(item => item.trim());
                return `<ul class="bonus-list">${items.map(item => `<li><i class="fas fa-star"></i> ${escapeHtml(item.trim())}</li>`).join('')}</ul>`;
            }
            return `<div class="text-content">${escapeHtml(content)}</div>`;
        }
        
        function formatItem(content) {
            const isLink = content.startsWith('http');
            if (isLink) {
                return `
                    <div class="text-content">${escapeHtml(content)}</div>
                    <div class="button-group">
                        <button class="copy-btn" id="copyUrlBtn"><i class="fas fa-copy"></i> 🔗 Salin Link</button>
                        <a href="${escapeHtml(content)}" class="copy-btn" target="_blank" style="text-decoration:none; text-align:center;"><i class="fas fa-external-link-alt"></i> Buka Link</a>
                    </div>
                `;
            }
            return `
                <div class="text-content">${escapeHtml(content)}</div>
                <button class="copy-btn" id="copyTextBtn"><i class="fas fa-copy"></i> 📋 Salin Teks</button>
            `;
        }
        
        async function cancelOrder() {
            if (!confirm('Batalkan pesanan ini?')) return;
            try {
                const res = await fetch(`/api/cancel-order/${orderCode}`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    toast('Pesanan dibatalkan');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    toast('Gagal batalkan', true);
                }
            } catch(e) {
                toast('Error', true);
            }
        }
        
        async function loadOrder() {
            try {
                const res = await fetch(`/api/get-order/${orderCode}`);
                const data = await res.json();
                if (!data.success) {
                    document.body.innerHTML = '<div class="card"><h1>Order Tidak Ditemukan</h1><a href="/" style="color:#60a5fa;">Kembali</a></div>';
                    return;
                }
                if (data.status === 'paid') {
                    document.getElementById('pendingContent').style.display = 'none';
                    document.getElementById('successContent').style.display = 'block';
                    document.getElementById('productName').innerText = data.productName;
                    
                    const container = document.getElementById('productCodeContainer');
                    container.innerHTML = formatItem(data.productCode);
                    
                    if (data.bonusContent && data.bonusContent !== '') {
                        document.getElementById('bonusContent').innerHTML = formatBonus(data.bonusContent);
                        document.getElementById('bonusContainer').style.display = 'block';
                        setTimeout(() => {
                            const copyBonusBtn = document.getElementById('copyBonusBtn');
                            if (copyBonusBtn) copyBonusBtn.onclick = () => copyToClipboard(data.bonusContent);
                        }, 100);
                    }
                    
                    setTimeout(() => {
                        const copyTextBtn = document.getElementById('copyTextBtn');
                        if (copyTextBtn) copyTextBtn.onclick = () => copyToClipboard(data.productCode);
                        const copyUrlBtn = document.getElementById('copyUrlBtn');
                        if (copyUrlBtn) copyUrlBtn.onclick = () => copyToClipboard(data.productCode);
                    }, 100);
                } else {
                    document.getElementById('qrisImage').src = data.qrisImage;
                    document.getElementById('totalAmount').innerText = data.totalAmount.toLocaleString();
                    document.getElementById('expiryTime').innerText = new Date(data.expiredAt).toLocaleString();
                    startPolling();
                }
            } catch (err) { console.error(err); }
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            toast('📋 Tersalin!');
        }
        
        function toast(msg) {
            const t = document.createElement('div');
            t.textContent = msg;
            t.style.position = 'fixed';
            t.style.bottom = '20px';
            t.style.left = '50%';
            t.style.transform = 'translateX(-50%)';
            t.style.background = '#1e293b';
            t.style.padding = '10px 20px';
            t.style.borderRadius = '40px';
            t.style.fontSize = '0.8rem';
            t.style.zIndex = '2000';
            t.style.color = 'white';
            t.style.animation = 'fadeIn 0.3s ease';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }
        
        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/api/check-payment/${orderCode}`);
                    const data = await res.json();
                    if (data.status === 'paid') {
                        clearInterval(pollingInterval);
                        document.getElementById('statusText').innerHTML = '<i class="fas fa-check-circle"></i> Pembayaran BERHASIL!';
                        setTimeout(() => location.reload(), 1500);
                    } else if (data.status === 'expired') {
                        clearInterval(pollingInterval);
                        document.getElementById('statusText').innerHTML = '<i class="fas fa-times-circle"></i> QRIS kadaluarsa';
                    }
                } catch(e) {}
            }, 5000);
        }
        
        async function checkStatus() {
            const statusDiv = document.getElementById('statusText');
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Mengecek...';
            try {
                const res = await fetch(`/api/check-payment/${orderCode}`);
                const data = await res.json();
                if (data.status === 'paid') {
                    statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Pembayaran BERHASIL!';
                    setTimeout(() => location.reload(), 1500);
                } else if (data.status === 'expired') {
                    statusDiv.innerHTML = '<i class="fas fa-times-circle"></i> QRIS kadaluarsa';
                } else {
                    statusDiv.innerHTML = '<i class="fas fa-hourglass-half"></i> Masih menunggu pembayaran';
                }
            } catch(e) {
                statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Gagal mengecek';
            }
        }
        
        loadOrder();
    </script>
</body>
</html>

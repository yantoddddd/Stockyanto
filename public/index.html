<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Yanto Store | Beli Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #06080d;
            --surface: rgba(255,255,255,0.03);
            --surface2: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.06);
            --accent: #3b82f6;
            --accent2: #60a5fa;
            --text: #e8eaed;
            --text2: #8b8fa3;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --radius: 20px;
            --radius-sm: 12px;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
        body { 
            background: var(--bg);
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            padding:0 16px 40px; 
            color: var(--text);
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(59,130,246,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(96,165,250,0.05) 0%, transparent 50%);
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeScale { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
        @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideRight { from { transform:translateX(100%); } to { transform:translateX(0); } }
        @keyframes bounceIn { 0% { transform:scale(0.3); opacity:0; } 50% { transform:scale(1.05); } 70% { transform:scale(0.9); } 100% { transform:scale(1); opacity:1; } }
        .container { max-width:1100px; margin:0 auto; padding-top:100px; }

        #splashScreen {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg); z-index:9999;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            background-image: radial-gradient(ellipse at center, rgba(59,130,246,0.1) 0%, transparent 70%);
        }
        #splashScreen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
        .splash-icon { font-size:3.5rem; margin-bottom:20px; }
        .splash-icon i { background:linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .splash-title { font-size:1.6rem; font-weight:800; letter-spacing:-0.5px; color:white; margin-bottom:4px; }
        .splash-sub { font-size:0.8rem; color:var(--text2); letter-spacing:1px; margin-bottom:28px; }
        .splash-loader { width:40px; height:40px; border:3px solid rgba(96,165,250,0.2); border-top-color:#60a5fa; border-radius:50%; animation:spin 0.8s linear infinite; }

        /* HEADER STICKY */
        .header-wrap {
            position: fixed; top: 0; left: 0; right: 0; z-index: 900;
            background: rgba(6,8,13,0.85); backdrop-filter: blur(20px);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }
        .header { 
            display:flex; justify-content:space-between; align-items:center; 
            max-width:1100px; margin:0 auto;
            padding:10px 22px;
            background:var(--surface2); backdrop-filter:blur(20px);
            border-radius:60px; border:1px solid var(--border);
        }
        .logo-wrap { 
            display:flex; align-items:center; gap:10px; cursor:pointer; 
            background:linear-gradient(135deg, rgba(59,130,246,0.2), rgba(96,165,250,0.1));
            border-radius:40px; padding:8px 18px; border:1px solid rgba(59,130,246,0.3);
            transition:0.3s;
        }
        .logo-wrap:hover { border-color:var(--accent); background:rgba(59,130,246,0.3); }
        .profile-avatar { 
            width:34px; height:34px; border-radius:50%; 
            background:linear-gradient(135deg, var(--accent), #6366f1); 
            display:flex; align-items:center; justify-content:center; 
            font-size:0.9rem; color:white;
        }
        .profile-text h1 { font-size:0.9rem; font-weight:700; color:white; letter-spacing:-0.3px; }
        .profile-text span { font-size:0.6rem; color:var(--accent2); letter-spacing:0.5px; }
        .menu-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1.1rem; }

        .search-filter-wrap { margin-bottom:22px; display:none; }
        .search-row { display:flex; gap:10px; margin-bottom:14px; }
        .search-input { 
            flex:1; padding:14px 20px; border-radius:var(--radius-sm); 
            border:1px solid var(--border); background:var(--surface2); 
            color:white; font-size:0.85rem; outline:none; transition:0.3s; 
        }
        .search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
        .search-input::placeholder { color:var(--text2); }
        .filter-scroll { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; }
        .filter-scroll::-webkit-scrollbar { height:2px; }
        .filter-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
        .filter-chip { 
            padding:8px 16px; border-radius:24px; border:1px solid var(--border);
            background:var(--surface); color:var(--text2); font-size:0.78rem;
            cursor:pointer; white-space:nowrap; transition:0.25s; font-weight:500;
        }
        .filter-chip:hover { border-color:var(--accent2); color:white; }
        .filter-chip.active { background:var(--accent); border-color:var(--accent); color:white; font-weight:600; }
        .results-info { font-size:0.7rem; color:var(--text2); margin-top:10px; }

        .sidebar { position:fixed; top:0; right:-310px; width:290px; height:100%; background:rgba(10,12,18,0.97); backdrop-filter:blur(24px); z-index:1000; transition:0.35s cubic-bezier(0.4,0,0.2,1); padding:70px 22px 22px; border-left:1px solid var(--border); overflow-y:auto; }
        .sidebar.open { right:0; animation:slideRight 0.3s ease; }
        .sidebar .close-btn { position:absolute; top:20px; right:18px; background:none; border:none; color:var(--text2); font-size:1.4rem; cursor:pointer; }
        .sidebar-title { color:var(--text2); font-size:0.65rem; text-transform:uppercase; letter-spacing:2px; margin:22px 0 10px; font-weight:700; }
        .sidebar .menu-item { display:flex; align-items:center; gap:12px; padding:12px 0; color:var(--text2); text-decoration:none; font-size:0.9rem; border-bottom:1px solid rgba(255,255,255,0.04); transition:0.2s; cursor:pointer; background:none; width:100%; text-align:left; border-left:none; border-right:none; border-top:none; }
        .sidebar .menu-item:hover { color:white; padding-left:6px; }
        .sidebar .menu-item i { width:22px; text-align:center; }
        
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999; display:none; }
        .overlay.show { display:block; }

        /* FLOATING BUTTONS */
        .float-buttons {
            position: fixed; bottom: 24px; right: 24px;
            display: flex; flex-direction: column; gap: 12px; z-index: 500;
        }
        .cart-float, .gacha-float {
            width: 56px; height: 56px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.5rem; cursor: pointer;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            transition: 0.3s; border: none; position: relative;
        }
        .cart-float { background: #3b82f6; box-shadow: 0 8px 24px rgba(59,130,246,0.4); }
        .gacha-float { background: linear-gradient(135deg, #f59e0b, #ef4444); box-shadow: 0 8px 24px rgba(245,158,11,0.4); animation: pulse 2s infinite; }
        .cart-float:active, .gacha-float:active { transform: scale(0.9); }
        .cart-count, .gacha-label {
            position: absolute; top: -4px; right: -4px;
            background: #ef4444; color: white; border-radius: 50%;
            width: 22px; height: 22px; font-size: 0.7rem;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
        }
        .gacha-label { width: auto; padding: 2px 8px; border-radius: 10px; font-size: 0.55rem; right: -8px; background: #f59e0b; color: #000; }

        .products-grid { 
            display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); 
            gap:18px; margin-bottom:24px; 
        }
        .product-card { 
            background:var(--surface2); border:1px solid var(--border);
            border-radius:var(--radius); padding:22px; 
            transition:0.3s; cursor:pointer; position:relative;
            animation:fadeScale 0.4s ease; animation-fill-mode:both;
            backdrop-filter:blur(10px); overflow:hidden;
        }
        .product-card::before {
            content:''; position:absolute; top:0; left:0; width:100%; height:3px;
            background:linear-gradient(90deg, var(--accent), #6366f1);
            opacity:0; transition:0.3s;
        }
        .product-card:hover::before { opacity:1; }
        .product-card:hover { transform:translateY(-4px); border-color:rgba(59,130,246,0.3); box-shadow:0 12px 30px rgba(0,0,0,0.3); }
        .product-card:active { transform:scale(0.98); }
        .product-badge { 
            position:absolute; top:16px; right:16px;
            padding:5px 10px; border-radius:20px; font-size:0.65rem; font-weight:600;
            background:rgba(59,130,246,0.15); color:var(--accent2);
            letter-spacing:0.3px;
        }
        .product-badge.hot { background:rgba(239,68,68,0.15); color:#fca5a5; }
        .product-badge.new { background:rgba(16,185,129,0.15); color:#6ee7b7; }
        .product-icon { font-size:2rem; margin-bottom:14px; opacity:0.8; }
        .product-name { font-size:1.1rem; font-weight:700; color:white; margin-bottom:6px; }
        .product-desc { font-size:0.75rem; color:var(--text2); margin-bottom:14px; line-height:1.5; }
        .product-price-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
        .product-price { font-size:1.5rem; font-weight:800; color:var(--accent2); }
        .product-stock { font-size:0.68rem; color:var(--text2); display:flex; align-items:center; gap:4px; }
        .product-actions { display:flex; gap:8px; }
        .btn-buy { 
            background:linear-gradient(135deg, var(--accent), #2563eb); 
            border:none; flex:1; padding:13px; border-radius:14px; 
            font-weight:600; color:white; cursor:pointer; 
            display:flex; align-items:center; justify-content:center; gap:8px;
            transition:0.25s; font-size:0.85rem; letter-spacing:-0.2px;
        }
        .btn-buy:hover { box-shadow:0 6px 20px rgba(37,99,235,0.35); transform:translateY(-1px); }
        .btn-buy:active { transform:scale(0.97); }
        .btn-buy:disabled { background:#334155; cursor:not-allowed; opacity:0.5; transform:none; box-shadow:none; }
        .btn-cart {
            background:var(--surface); border:1px solid var(--border);
            border-radius:14px; padding:13px 16px; color:var(--text2);
            cursor:pointer; transition:0.25s; font-size:0.85rem;
            display:flex; align-items:center; justify-content:center;
        }
        .btn-cart:hover { background:var(--surface2); border-color:var(--accent); color:white; }
        .btn-cart:active { transform:scale(0.97); }

        .load-more-wrap { text-align:center; margin-bottom:30px; display:none; }
        .btn-load-more { 
            background:var(--surface); border:1px solid var(--border);
            padding:12px 32px; border-radius:30px; color:var(--text2);
            cursor:pointer; font-size:0.8rem; transition:0.25s; font-weight:500;
        }
        .btn-load-more:hover { background:var(--surface2); border-color:var(--accent); color:white; }

        .empty-state { text-align:center; padding:80px 20px; color:var(--text2); animation:fadeScale 0.5s ease; }
        .empty-state i { font-size:4rem; margin-bottom:16px; opacity:0.3; }
        .empty-state p { font-size:0.9rem; }

        #maintenanceScreen { display: none; text-align: center; padding: 120px 20px; animation: fadeScale 0.5s ease; }
        #maintenanceScreen .maint-icon { font-size: 4rem; margin-bottom: 16px; }
        #maintenanceScreen h2 { color: var(--warning); font-size: 1.5rem; margin-bottom: 8px; }
        #maintenanceScreen p { color: var(--text2); font-size: 0.9rem; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(6px); justify-content:center; align-items:center; z-index:1100; }
        .modal-content { 
            background:linear-gradient(160deg, #111827, #0f172a); border-radius:28px; padding:32px; 
            max-width:420px; width:90%; border:1px solid var(--border);
            animation:fadeScale 0.3s ease; max-height:85vh; overflow-y:auto;
        }
        .modal-content h3 { font-size:1.3rem; font-weight:700; color:white; margin-bottom:6px; display:flex; align-items:center; gap:10px; }
        input { 
            width:100%; padding:14px 18px; margin:8px 0; border-radius:14px;
            border:1px solid var(--border); background:var(--surface); 
            color:white; font-size:0.9rem; outline:none; transition:0.3s;
        }
        input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
        .btn-primary { 
            background:linear-gradient(135deg, var(--accent), #2563eb); 
            width:100%; padding:15px; border:none; border-radius:14px;
            font-weight:600; color:white; cursor:pointer; margin-top:14px;
            display:flex; align-items:center; justify-content:center; gap:8px;
            transition:0.25s; font-size:0.9rem;
        }
        .btn-primary:hover { box-shadow:0 6px 20px rgba(37,99,235,0.35); }
        .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-secondary { 
            background:var(--surface2); width:100%; padding:13px; border:none; border-radius:14px;
            font-weight:500; color:var(--text2); cursor:pointer; margin-top:8px;
            display:flex; align-items:center; justify-content:center; gap:8px; transition:0.2s;
            border:1px solid var(--border);
        }
        .btn-secondary:hover { background:var(--border); color:white; }
        .toast { 
            position:fixed; bottom:30px; left:50%; transform:translateX(-50%); 
            background:#1e293b; padding:12px 24px; border-radius:30px; font-size:0.8rem;
            opacity:0; transition:0.3s; z-index:1200; color:white; 
            display:flex; align-items:center; gap:8px; box-shadow:0 8px 30px rgba(0,0,0,0.4);
        }
        .loading-spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
        .site-footer { text-align:center; padding:20px; color:var(--text2); font-size:0.65rem; border-top:1px solid var(--border); margin-top:20px; }
        .site-footer a { color:var(--text2); text-decoration:none; margin:0 8px; transition:0.2s; }
        .site-footer a:hover { color:var(--accent2); }

        #loadingOverlay {
            display:none; position:fixed; top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
            z-index:1300; justify-content:center; align-items:center; flex-direction:column; gap:16px;
        }
        #loadingOverlay .loading-text { color:white; font-size:0.9rem; }

        @media (max-width:640px) { .products-grid { grid-template-columns:1fr; } .header { padding:12px 16px; } .product-actions { flex-direction:column; } .btn-cart { width:100%; } }
    </style>
</head>
<body>

<div id="splashScreen">
    <div class="splash-icon"><i class="fas fa-store-alt"></i></div>
    <div class="splash-title">Yanto Store</div>
    <div class="splash-sub">AutoOrder Digital</div>
    <div class="splash-loader"></div>
</div>

<!-- HEADER STICKY -->
<div class="header-wrap">
    <div class="header">
        <div class="logo-wrap" onclick="window.location.href='/profile'">
            <div class="profile-avatar"><i class="fas fa-user"></i></div>
            <div class="profile-text">
                <h1 id="headerProfileName">Profile</h1>
                <span id="headerProfileSub">Login / Daftar</span>
            </div>
        </div>
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
    </div>
</div>

<div class="container" id="mainContainer" style="display:none;">

    <div id="maintenanceScreen">
        <div class="maint-icon">🔧</div>
        <h2>Toko Sedang Maintenance</h2>
        <p>Maaf ya Bre, lagi ada perbaikan. Balik lagi nanti!</p>
        <p style="margin-top:16px;font-size:0.7rem;">Kontak: <a href="https://t.me/Yantoidiotbruh" style="color:#60a5fa;">@Yantoidiotbruh</a></p>
    </div>

    <div id="mainShopContent">
        <div class="search-filter-wrap" id="searchFilterWrap">
            <div class="search-row"><input type="text" class="search-input" id="searchInput" placeholder="Cari produk..." oninput="renderProducts()"></div>
            <div class="filter-scroll" id="filterScroll"></div>
            <div class="results-info" id="resultsInfo"></div>
        </div>

        <div class="products-grid" id="productsGrid"></div>
        <div class="load-more-wrap" id="loadMoreWrap">
            <button class="btn-load-more" onclick="loadMore()"><i class="fas fa-chevron-down"></i> Tampilkan Lebih Banyak</button>
        </div>

        <div class="site-footer">
            <span>&copy; 2026 Yanto Store</span>
            <a href="/ketentuan">Ketentuan</a>
        </div>
    </div>
</div>

<!-- FLOATING BUTTONS -->
<div class="float-buttons">
    <button class="gacha-float" onclick="window.location.href='/gacha'" title="Gacha!">
        🎰
        <span class="gacha-label" id="gachaFloatPrice">-</span>
    </button>
    <button class="cart-float" onclick="openCart()" aria-label="Keranjang belanja">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount" style="display:none;">0</span>
    </button>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
    <button class="close-btn" onclick="toggleMenu()"><i class="fas fa-times"></i></button>
    <div class="sidebar-title">Menu</div>
    <button class="menu-item" onclick="lacakOrder()"><i class="fas fa-search"></i> Lacak Pesanan</button>
    <a href="/" class="menu-item"><i class="fas fa-home"></i> Beranda</a>
    <a href="/ketentuan" class="menu-item"><i class="fas fa-file-contract"></i> Ketentuan</a>
    <div class="sidebar-title">Bantuan</div>
    <a href="https://t.me/Yantoidiotbruh" target="_blank" class="menu-item"><i class="fab fa-telegram-plane"></i> Telegram</a>
    <a href="https://wa.me/6289676041776" target="_blank" class="menu-item"><i class="fab fa-whatsapp"></i> WhatsApp</a>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal" class="

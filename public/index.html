<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoOrder | Beli Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a2b5e 0%, #0f3b7a 100%);
            font-family: 'Inter', 'Poppins', sans-serif;
            min-height: 100vh;
            padding: 24px 16px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #b8e1ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .header p { color: #cbd5e6; font-size: 0.95rem; }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .product-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .product-card:hover { transform: translateY(-6px); background: rgba(255,255,255,0.12); }
        .product-name { font-size: 1.4rem; font-weight: 700; color: white; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .product-price { font-size: 1.8rem; font-weight: 800; color: #60a5fa; margin: 12px 0; }
        .product-stock { font-size: 0.8rem; color: #9ca3af; margin-bottom: 20px; }
        .btn-buy {
            background: linear-gradient(95deg, #2563eb, #1d4ed8);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-buy:hover:not(:disabled) { background: linear-gradient(95deg, #3b82f6, #2563eb); transform: scale(1.02); }
        .btn-buy:disabled { background: #475569; cursor: not-allowed; opacity: 0.6; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #0f172a;
            border-radius: 32px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #334155;
        }
        .modal-content h3 { font-size: 1.6rem; font-weight: 700; color: white; margin-bottom: 12px; }
        .modal-price { font-size: 1.8rem; font-weight: 800; color: #60a5fa; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 24px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
        .btn-primary {
            background: #3b82f6;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            margin-top: 12px;
        }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary {
            background: #334155;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            margin-top: 8px;
        }
        .qris-img { width: 100%; max-width: 240px; margin: 20px auto; display: block; background: white; padding: 12px; border-radius: 24px; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            opacity: 0;
            transition: 0.2s;
            z-index: 1100;
            color: white;
            font-weight: 500;
        }
        .code-box { background: #0f172a; padding: 16px; border-radius: 20px; margin-top: 20px; border-left: 4px solid #10b981; word-break: break-all; }
        @media (max-width: 640px) { .header h1 { font-size: 1.6rem; } .product-name { font-size: 1.2rem; } .product-price { font-size: 1.4rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-store"></i> AutoOrder Digital</h1>
        <p>Akun Roblox | Web | APK | DLL | Bayar pakai QRIS</p>
    </div>
    <div class="products-grid" id="productsGrid">Loading...</div>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <h3 id="modalProductName"></h3>
        <div class="modal-price" id="modalPrice"></div>
        <input type="text" id="customerName" placeholder="Nama lengkap *" required>
        <input type="email" id="customerEmail" placeholder="Email (opsional)">
        <button class="btn-primary" id="confirmOrderBtn"><i class="fas fa-shopping-cart"></i> Beli Sekarang</button>
        <button class="btn-secondary" onclick="closeModal()"><i class="fas fa-times"></i> Tutup</button>
        <div id="qrisContainer" style="display:none; margin-top:20px;">
            <img id="qrisImage" class="qris-img" alt="QRIS">
            <p id="paymentStatus" style="text-align:center; color:#94a3b8;">⏳ Menunggu pembayaran...</p>
            <div id="resultCode"></div>
            <button id="cancelBtn" class="btn-secondary" style="background:#b91c1c;"><i class="fas fa-trash"></i> Batalkan</button>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
    // ========== QRISPY TOKEN (AMAN KARENA HANYA UNTUK GENERATE QRIS) ==========
    const QRISPY_TOKEN = 'cki_IBpAYezwDHbfrMuENZMFvFw5mI94M11dAT146N0Ar4HrOWKi';
    const API_URL = 'https://api.qrispy.id';

    let currentProduct = null;
    let currentOrderId = null;
    let paymentInterval = null;

    function toast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = isError ? '#b91c1c' : '#1e293b';
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }

    async function loadProducts() {
        try {
            const res = await fetch('/api/products');
            const data = await res.json();
            const grid = document.getElementById('productsGrid');
            if (!data.products || data.products.length === 0) {
                grid.innerHTML = '<div style="text-align:center; color:#cbd5e6; grid-column:1/-1;">Belum ada produk. Login admin untuk menambahkan.</div>';
                return;
            }
            grid.innerHTML = data.products.map(p => `
                <div class="product-card">
                    <div class="product-name"><i class="fas fa-box"></i> ${escapeHtml(p.name)}</div>
                    <div class="product-price">Rp ${(p.price || 0).toLocaleString()}</div>
                    <div class="product-stock"><i class="fas fa-database"></i> Stok: ${p.stock}</div>
                    <button class="btn-buy" onclick='openOrder(${JSON.stringify(p).replace(/'/g, "&#39;")})' ${p.stock <= 0 ? 'disabled' : ''}>
                        ${p.stock > 0 ? '<i class="fas fa-credit-card"></i> Beli Sekarang' : '<i class="fas fa-ban"></i> Stok Habis'}
                    </button>
                </div>
            `).join('');
        } catch(e) { toast('Gagal load produk', true); }
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

    function openOrder(product) {
        currentProduct = product;
        document.getElementById('modalProductName').innerText = product.name;
        document.getElementById('modalPrice').innerHTML = `Rp ${product.price.toLocaleString()}`;
        document.getElementById('customerName').value = '';
        document.getElementById('customerEmail').value = '';
        document.getElementById('qrisContainer').style.display = 'none';
        document.getElementById('confirmOrderBtn').style.display = 'block';
        document.getElementById('paymentModal').style.display = 'flex';
        if (paymentInterval) clearInterval(paymentInterval);
    }

    function closeModal() {
        document.getElementById('paymentModal').style.display = 'none';
        currentOrderId = null;
        if (paymentInterval) clearInterval(paymentInterval);
    }

    // Generate QRIS langsung dari frontend (biar ga kena blokir Cloudflare)
    async function generateQRISFrontend(amount) {
        const response = await fetch(`${API_URL}/api/payment/qris/generate`, {
            method: 'POST',
            headers: { 'X-API-Token': QRISPY_TOKEN, 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount })
        });
        const data = await response.json();
        if (data.status !== 'success') throw new Error(data.message || 'Gagal generate QRIS');
        return data.data;
    }

    document.getElementById('confirmOrderBtn').onclick = async () => {
        const name = document.getElementById('customerName').value.trim();
        if (!name) { toast('Nama wajib diisi', true); return; }
        const email = document.getElementById('customerEmail').value.trim();
        const btn = document.getElementById('confirmOrderBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Membuat QRIS...';

        try {
            // 1. Generate QRIS dari frontend (biar ga kena blokir)
            const qrisData = await generateQRISFrontend(currentProduct.price);
            
            // 2. Simpan order ke backend (untuk history dan admin)
            const orderRes = await fetch('/api/order-frontend', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    productId: currentProduct.id,
                    customerName: name,
                    customerEmail: email,
                    qrisId: qrisData.qris_id,
                    qrisImage: qrisData.qris_image_url,
                    amount: currentProduct.price,
                    expiredAt: qrisData.expired_at
                })
            });
            const orderData = await orderRes.json();
            if (!orderData.success) throw new Error(orderData.error);

            currentOrderId = orderData.orderId;
            document.getElementById('qrisImage').src = qrisData.qris_image_url;
            document.getElementById('qrisContainer').style.display = 'block';
            document.getElementById('confirmOrderBtn').style.display = 'none';
            document.getElementById('paymentStatus').innerHTML = '⏳ Menunggu pembayaran...';
            document.getElementById('resultCode').innerHTML = '';
            startPaymentPolling();
            toast('QRIS berhasil dibuat, silakan scan');
        } catch (err) {
            toast(err.message, true);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-shopping-cart"></i> Beli Sekarang';
        }
    };

    function startPaymentPolling() {
        if (paymentInterval) clearInterval(paymentInterval);
        paymentInterval = setInterval(async () => {
            if (!currentOrderId) return;
            try {
                const res = await fetch(`/api/check-payment/${currentOrderId}`);
                const data = await res.json();
                if (data.status === 'paid') {
                    clearInterval(paymentInterval);
                    document.getElementById('paymentStatus').innerHTML = '✅ Pembayaran BERHASIL!';
                    document.getElementById('resultCode').innerHTML = `<div class="code-box"><i class="fas fa-gift"></i> <strong>Barang Digital Anda:</strong><br>${escapeHtml(data.productCode)}</div>`;
                    document.getElementById('cancelBtn').style.display = 'none';
                    toast('Pembayaran berhasil! Cek kode di atas');
                    loadProducts(); // refresh stok
                } else if (data.status === 'expired') {
                    clearInterval(paymentInterval);
                    document.getElementById('paymentStatus').innerHTML = '❌ QRIS kadaluarsa';
                    toast('QRIS kadaluarsa, silakan order ulang', true);
                }
            } catch(e) {}
        }, 3000);
    }

    document.getElementById('cancelBtn')?.addEventListener('click', async () => {
        if (!currentOrderId) return;
        if (confirm('Batalkan pesanan?')) {
            await fetch(`/api/cancel-order/${currentOrderId}`, { method: 'POST' });
            clearInterval(paymentInterval);
            toast('Pesanan dibatalkan');
            closeModal();
        }
    });

    loadProducts();
</script>
</body>
</html>
